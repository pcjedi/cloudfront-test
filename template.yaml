AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Deploy a static HTML page to S3 and serve it globally via CloudFront.
  The S3 bucket is kept private; CloudFront reads from it using Origin Access
  Control (OAC). A Lambda-backed custom resource uploads index.html on every
  stack create/update and removes it on delete.

# ─────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────
Parameters:
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100   # US, Canada, Europe
      - PriceClass_200   # + Asia, Middle East, Africa
      - PriceClass_All   # All edge locations
    Description: CloudFront price class (controls which edge locations are used)

# ─────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────
Resources:

  # ── S3 Bucket ────────────────────────────────────────────────────────────────
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  # ── Bucket Policy – allows CloudFront OAC ────────────────────────────────────
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Origin Access Control ─────────────────────────────────────────
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        Description: OAC for the website S3 origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Static website distribution – ${AWS::StackName}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: !Ref PriceClass
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig: {}          # must be present but empty when using OAC (not OAI)
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS Managed CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

  # ── Lambda – deploys the HTML file (custom resource) ─────────────────────────
  WebsiteDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ObjectAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${WebsiteBucket.Arn}/index.html"

  WebsiteDeployer:
    Type: AWS::Serverless::Function
    Properties:
      Description: Custom resource – uploads index.html to the website S3 bucket
      CodeUri: functions/deployer/
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt WebsiteDeployerRole.Arn
      Timeout: 30

  # ── Custom Resource – triggers the deployer on create/update/delete ───────────
  WebsiteContent:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: WebsiteBucketPolicy
    Properties:
      ServiceToken: !GetAtt WebsiteDeployer.Arn
      BucketName: !Ref WebsiteBucket
      # Changing HtmlContent triggers an Update, which re-uploads the file.
      HtmlContent: |
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>CloudFront Website</title>
          <style>
            body {
              font-family: Arial, sans-serif;
              max-width: 800px;
              margin: 80px auto;
              padding: 0 20px;
              color: #333;
            }
            h1 { color: #232f3e; }
            .badge {
              display: inline-block;
              background: #ff9900;
              color: #fff;
              padding: 4px 12px;
              border-radius: 4px;
              font-size: 0.9em;
            }
          </style>
        </head>
        <body>
          <h1>Hello from CloudFront! 🚀</h1>
          <p>This page is served via <span class="badge">Amazon CloudFront</span> from a private S3 bucket.</p>
          <p>The bucket is not publicly accessible; only CloudFront can read from it using Origin Access Control (OAC).</p>
        </body>
        </html>

# ─────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────
Outputs:
  CloudFrontURL:
    Description: Public URL of the CloudFront distribution
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID (useful for cache invalidations)
    Value: !Ref CloudFrontDistribution

  WebsiteBucketName:
    Description: Name of the S3 bucket holding the website files
    Value: !Ref WebsiteBucket
