<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudFront Website</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Hello from CloudFront! 🚀</h1>
    <p>
      This page is served via <span class="badge">Amazon CloudFront</span> from
      a private S3 bucket
    </p>
    <p>
      The bucket is not publicly accessible. Only CloudFront can read from it
      using Origin Access Control (OAC).
    </p>

    <div class="info-cards">
      <div class="card">
        <h3>Region</h3>
        <p id="region">Detecting…</p>
      </div>
      <div class="card">
        <h3>Local Time</h3>
        <p id="clock">--:--:--</p>
      </div>
      <div class="card">
        <h3>Page Loaded</h3>
        <p id="load-time">Measuring…</p>
      </div>
    </div>

    <footer>Served by <span class="badge">CloudFront + S3</span></footer>

    <script src="app.js"></script>
  </body>
</html>
