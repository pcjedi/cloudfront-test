<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudFront Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 80px auto;
        padding: 0 20px;
        color: #333;
      }
      h1 {
        color: #232f3e;
      }
      .badge {
        display: inline-block;
        background: #ff9900;
        color: #fff;
        padding: 4px 12px;
        border-radius: 4px;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <h1>Hello from CloudFront! 🚀</h1>
    <p>
      This page is served via <span class="badge">Amazon CloudFront</span> from
      a private S3 bucket
    </p>
    <p>
      The bucket is not publicly accessible. Only CloudFront can read from it
      using Origin Access Control (OAC).
    </p>
  </body>
</html>
