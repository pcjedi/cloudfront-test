---
on:
  pull_request:
    types:
      - closed

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    env:
      AWS_REGION: eu-central-1
      SAM_CLI_TELEMETRY: 0
      STACK_NAME: ${{ format('{0}-{1}', github.event.repository.name, github.event_name == 'push' && github.ref_name || format('pr-{0}', github.event.number)) }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsDeployRole
      - run: aws cloudformation describe-stacks --stack-name "$STACK_NAME" > stack.json
      - run: jq -r '.' stack.json
      - run: jq -r '.Stacks[0].Outputs[] | "\(.OutputKey)=\(.OutputValue)"' stack.json >> "$GITHUB_OUTPUT"
        id: cf_outputs
      - run: echo "$steps"
        env:
          steps: ${{ toJson(steps) }}
      - run: aws s3 rm "s3://${{ steps.cf_outputs.outputs.WebsiteBucketName }}/" --recursive
      - run: aws s3api delete-bucket --bucket "${{ steps.cf_outputs.outputs.WebsiteBucketName }}"
      - run: >
          sam delete
          --stack-name "$STACK_NAME"
          --no-prompts